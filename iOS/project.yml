name: SepticLog
options:
  bundleIdPrefix: com.shimondeitel.septiclog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SepticLog:
    type: application
    platform: iOS
    sources:
      - path: SepticLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.septiclog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SepticLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SepticLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SepticLogTests
      - path: SepticLog.storekit
    dependencies:
      - target: SepticLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.septiclog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SepticLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SepticLogUITests
    dependencies:
      - target: SepticLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.septiclog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SepticLog:
    build:
      targets:
        SepticLog: all
        SepticLogTests: [test]
        SepticLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SepticLog.storekit
    test:
      config: Debug
      storeKitConfiguration: SepticLog.storekit
      targets:
        - SepticLogTests
        - SepticLogUITests
    archive:
      config: Release
